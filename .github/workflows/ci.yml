# ═══════════════════════════════════════════════════════════════════════════════
# Shared CI/CD Pipeline — Yggdrasil Platform
# Called by all project repos via workflow_call
# Repo: kschmidtlarsen/.github
# ═══════════════════════════════════════════════════════════════════════════════

name: Shared CI Pipeline

on:
  workflow_call:
    inputs:
      # ── Project identity ──────────────────────────────
      project-id:
        description: 'Forseti project ID (e.g. kanban, mimir, calify)'
        required: true
        type: string

      # ── Node / install ────────────────────────────────
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      working-directory:
        description: 'Directory containing package.json'
        required: false
        type: string
        default: 'backend'

      # ── Database ──────────────────────────────────────
      needs-postgres:
        description: 'Whether tests need a PostgreSQL service'
        required: false
        type: boolean
        default: true
      postgres-version:
        description: 'PostgreSQL Docker image version'
        required: false
        type: string
        default: '17'
      db-name:
        description: 'Test database name'
        required: false
        type: string
        default: 'test_db'
      db-user:
        description: 'Test database user'
        required: false
        type: string
        default: 'test_user'
      db-password:
        description: 'Test database password'
        required: false
        type: string
        default: 'testpassword'
      db-init-command:
        description: 'Command to initialize the database (run in working-directory). Empty = skip.'
        required: false
        type: string
        default: ''

      # ── Test configuration ────────────────────────────
      test-command:
        description: 'Unit test command'
        required: false
        type: string
        default: 'npm test -- --coverage --coverageReporters=lcov'
      lint-hard-fail:
        description: 'Whether lint failure should fail the build'
        required: false
        type: boolean
        default: false
      run-npm-audit:
        description: 'Run npm audit step'
        required: false
        type: boolean
        default: true
      fix-coverage-paths:
        description: 'Fix coverage lcov paths for SonarCloud (prefix with working-directory)'
        required: false
        type: boolean
        default: false

      # ── E2E Tests ─────────────────────────────────────
      run-e2e:
        description: 'Run Playwright E2E tests'
        required: false
        type: boolean
        default: true
      e2e-grep:
        description: 'Playwright --grep filter (e.g. @smoke). Empty = run all.'
        required: false
        type: string
        default: ''
      cache-playwright:
        description: 'Cache Playwright browser binaries'
        required: false
        type: boolean
        default: true

      # ── Docker build ──────────────────────────────────
      build-docker:
        description: 'Build and push Docker image to GHCR'
        required: false
        type: boolean
        default: true
      dockerfile:
        description: 'Dockerfile path'
        required: false
        type: string
        default: 'Dockerfile.yggdrasil'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Quality Checks + E2E Tests (single job to share postgres service)
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Test & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:${{ inputs.postgres-version }}
        env:
          POSTGRES_DB: ${{ inputs.db-name }}
          POSTGRES_USER: ${{ inputs.db-user }}
          POSTGRES_PASSWORD: ${{ inputs.db-password }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${{ inputs.db-name }}
      DB_USER: ${{ inputs.db-user }}
      DB_PASSWORD: ${{ inputs.db-password }}
      NODE_ENV: test
      CI: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      # ── Database init ─────────────────────────────────
      - name: Install PostgreSQL client
        if: inputs.needs-postgres && inputs.db-init-command != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client > /dev/null

      - name: Initialize database
        if: inputs.needs-postgres && inputs.db-init-command != ''
        working-directory: ${{ inputs.working-directory }}
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGDATABASE: ${{ inputs.db-name }}
          PGUSER: ${{ inputs.db-user }}
          PGPASSWORD: ${{ inputs.db-password }}
        run: ${{ inputs.db-init-command }}

      # ── Lint ──────────────────────────────────────────
      - name: Lint
        id: lint
        working-directory: ${{ inputs.working-directory }}
        run: npm run lint
        continue-on-error: ${{ !inputs.lint-hard-fail }}

      # ── Unit Tests ────────────────────────────────────
      - name: Unit tests
        id: unit
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
        timeout-minutes: 5
        continue-on-error: true

      - name: Fix coverage paths
        if: inputs.fix-coverage-paths
        run: |
          LCOV="${{ inputs.working-directory }}/coverage/lcov.info"
          if [ -f "$LCOV" ]; then
            sed -i "s|SF:src/|SF:${{ inputs.working-directory }}/src/|g" "$LCOV"
          fi

      # ── npm audit ─────────────────────────────────────
      - name: npm audit
        id: audit
        if: inputs.run-npm-audit
        working-directory: ${{ inputs.working-directory }}
        run: npm audit --audit-level=moderate --json > /tmp/audit-output.json 2>&1 || true
        continue-on-error: true

      # ── SonarCloud ────────────────────────────────────
      - name: SonarCloud Scan
        id: sonar
        uses: SonarSource/sonarcloud-github-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── E2E Tests (Playwright) ────────────────────────
      - name: Cache Playwright browsers
        if: inputs.run-e2e && inputs.cache-playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}

      - name: Install Playwright browsers
        if: inputs.run-e2e && (steps.pw-cache.outputs.cache-hit != 'true' || !inputs.cache-playwright)
        working-directory: ${{ inputs.working-directory }}
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: inputs.run-e2e && inputs.cache-playwright && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        id: e2e
        if: inputs.run-e2e
        working-directory: ${{ inputs.working-directory }}
        run: npx playwright test --reporter=json,html ${{ inputs.e2e-grep && format('--grep {0}', inputs.e2e-grep) || '' }}
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: test-results.json
        continue-on-error: true

      # ── Upload all results to Forseti ─────────────────
      - name: Upload results to Forseti
        if: always()
        env:
          FORSETI_URL: https://forseti.exe.pm
          PROJECT_ID: ${{ inputs.project-id }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          upload() {
            local type="$1" status="$2" stats="$3" summary="$4" duration="${5:-0}" phases="${6:-[]}"
            curl -sf -X POST "$FORSETI_URL/api/results/upload/$PROJECT_ID" \
              -H "Content-Type: application/json" \
              -H "CF-Access-Client-Id: $CF_ID" \
              -H "CF-Access-Client-Secret: $CF_SECRET" \
              -d "{
                \"test_type\": \"$type\",
                \"status\": \"$status\",
                \"stats\": $stats,
                \"summary\": \"$summary\",
                \"duration_ms\": $duration,
                \"source\": \"github-actions\",
                \"phases\": $phases,
                \"environment\": {\"branch\":\"$BRANCH\",\"commit\":\"$COMMIT\",\"url\":\"$RUN_URL\"}
              }" > /dev/null && echo "  ✓ $type" || echo "  ✗ $type (upload failed)"
          }

          echo "Uploading results to Forseti..."

          # Lint
          [ "${{ steps.lint.outcome }}" = "success" ] \
            && upload eslint passed '{"total":1,"passed":1,"failed":0}' "ESLint passed" \
            || upload eslint failed '{"total":1,"passed":0,"failed":1}' "ESLint failed"

          # Unit tests
          [ "${{ steps.unit.outcome }}" = "success" ] \
            && upload jest-unit passed '{"total":1,"passed":1,"failed":0}' "Unit tests passed" \
            || upload jest-unit failed '{"total":1,"passed":0,"failed":1}' "Unit tests failed"

          # npm audit
          if [ "${{ inputs.run-npm-audit }}" = "true" ]; then
            VULNS=0
            if [ -f /tmp/audit-output.json ]; then
              VULNS=$(jq '[.metadata.vulnerabilities // {} | to_entries[] | .value] | add // 0' /tmp/audit-output.json 2>/dev/null || echo 0)
            fi
            [ "$VULNS" = "0" ] \
              && upload npm-audit passed '{"total":1,"passed":1,"failed":0}' "No vulnerabilities" \
              || upload npm-audit failed "{\"total\":1,\"passed\":0,\"failed\":1}" "$VULNS vulnerabilities"
          fi

          # SonarCloud
          [ "${{ steps.sonar.outcome }}" = "success" ] \
            && upload sonarcloud passed '{"total":1,"passed":1,"failed":0}' "Quality gate passed" \
            || upload sonarcloud failed '{"total":1,"passed":0,"failed":1}' "SonarCloud failed"

          # E2E (Playwright)
          if [ "${{ inputs.run-e2e }}" = "true" ]; then
            RESULTS_FILE="${{ inputs.working-directory }}/test-results.json"
            if [ -f "$RESULTS_FILE" ]; then
              TOTAL=$(jq '((.stats.expected//0)+(.stats.unexpected//0)+(.stats.skipped//0))' "$RESULTS_FILE")
              PASSED=$(jq '.stats.expected//0' "$RESULTS_FILE")
              FAILED=$(jq '.stats.unexpected//0' "$RESULTS_FILE")
              SKIPPED=$(jq '.stats.skipped//0' "$RESULTS_FILE")
              DUR=$(jq '.stats.duration//0|floor' "$RESULTS_FILE")
              [ "$FAILED" -gt 0 ] && E2E_S=failed || E2E_S=passed
              upload playwright-e2e "$E2E_S" "{\"total\":$TOTAL,\"passed\":$PASSED,\"failed\":$FAILED,\"skipped\":$SKIPPED}" "$PASSED/$TOTAL passed" "$DUR"
            else
              [ "${{ steps.e2e.outcome }}" = "success" ] \
                && upload playwright-e2e passed '{"total":1,"passed":1,"failed":0}' "E2E passed" \
                || upload playwright-e2e failed '{"total":1,"passed":0,"failed":1}' "E2E failed"
            fi
          fi

          # Summary table
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ steps.unit.outcome }} |" >> $GITHUB_STEP_SUMMARY
          [ "${{ inputs.run-npm-audit }}" = "true" ] && echo "| npm audit | ${{ steps.audit.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SonarCloud | ${{ steps.sonar.outcome }} |" >> $GITHUB_STEP_SUMMARY
          [ "${{ inputs.run-e2e }}" = "true" ] && echo "| E2E Tests | ${{ steps.e2e.outcome }} |" >> $GITHUB_STEP_SUMMARY

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: inputs.run-e2e && failure()
        with:
          name: playwright-report
          path: ${{ inputs.working-directory }}/playwright-report/
          retention-days: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker Build & Push
  # ═══════════════════════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker
    needs: test
    if: inputs.build-docker && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_TIMESTAMP=${{ github.event.head_commit.timestamp }}
