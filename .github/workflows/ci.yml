# ═══════════════════════════════════════════════════════════════════════════════
# Shared CI/CD Pipeline — Yggdrasil Platform
# Called by all project repos via workflow_call
# Repo: kschmidtlarsen/.github
# ═══════════════════════════════════════════════════════════════════════════════

name: Shared CI Pipeline

on:
  workflow_call:
    inputs:
      # ── Project identity ──────────────────────────────
      project-id:
        description: 'Forseti project ID (e.g. kanban, mimir, calify)'
        required: true
        type: string

      # ── Node / install ────────────────────────────────
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      working-directory:
        description: 'Directory containing package.json'
        required: false
        type: string
        default: 'backend'

      # ── Database ──────────────────────────────────────
      needs-postgres:
        description: 'Whether tests need a PostgreSQL service'
        required: false
        type: boolean
        default: true
      postgres-version:
        description: 'PostgreSQL Docker image version'
        required: false
        type: string
        default: '17'
      db-name:
        description: 'Test database name'
        required: false
        type: string
        default: 'test_db'
      db-user:
        description: 'Test database user'
        required: false
        type: string
        default: 'test_user'
      db-password:
        description: 'Test database password'
        required: false
        type: string
        default: 'testpassword'
      db-init-command:
        description: 'Command to initialize the database (run in working-directory). Empty = skip.'
        required: false
        type: string
        default: ''

      # ── Test configuration ────────────────────────────
      test-command:
        description: 'Unit test command'
        required: false
        type: string
        default: 'npm test -- --coverage --coverageReporters=lcov'
      lint-hard-fail:
        description: 'Whether lint failure should fail the build'
        required: false
        type: boolean
        default: false
      run-npm-audit:
        description: 'Run npm audit step'
        required: false
        type: boolean
        default: true
      fix-coverage-paths:
        description: 'Fix coverage lcov paths for SonarCloud (prefix with working-directory)'
        required: false
        type: boolean
        default: false

      # ── E2E Tests ─────────────────────────────────────
      run-e2e:
        description: 'Run Playwright E2E tests'
        required: false
        type: boolean
        default: true
      e2e-grep:
        description: 'Playwright --grep filter (e.g. @smoke). Empty = run all.'
        required: false
        type: string
        default: ''
      cache-playwright:
        description: 'Cache Playwright browser binaries'
        required: false
        type: boolean
        default: true

      # ── Docker build ──────────────────────────────────
      build-docker:
        description: 'Build and push Docker image to GHCR'
        required: false
        type: boolean
        default: true
      dockerfile:
        description: 'Dockerfile path'
        required: false
        type: string
        default: 'Dockerfile.yggdrasil'

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Quality Checks + E2E Tests (single job to share postgres service)
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Test & Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:${{ inputs.postgres-version }}
        env:
          POSTGRES_DB: ${{ inputs.db-name }}
          POSTGRES_USER: ${{ inputs.db-user }}
          POSTGRES_PASSWORD: ${{ inputs.db-password }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: ${{ inputs.db-name }}
      DB_USER: ${{ inputs.db-user }}
      DB_PASSWORD: ${{ inputs.db-password }}
      DATABASE_URL: postgresql://${{ inputs.db-user }}:${{ inputs.db-password }}@localhost:5432/${{ inputs.db-name }}
      NODE_ENV: test
      CI: true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci

      # ── Database init ─────────────────────────────────
      - name: Install PostgreSQL client
        if: inputs.needs-postgres && inputs.db-init-command != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client > /dev/null

      - name: Initialize database
        if: inputs.needs-postgres && inputs.db-init-command != ''
        working-directory: ${{ inputs.working-directory }}
        env:
          PGHOST: localhost
          PGPORT: '5432'
          PGDATABASE: ${{ inputs.db-name }}
          PGUSER: ${{ inputs.db-user }}
          PGPASSWORD: ${{ inputs.db-password }}
        run: ${{ inputs.db-init-command }}

      # ── Lint ──────────────────────────────────────────
      - name: Lint
        id: lint
        working-directory: ${{ inputs.working-directory }}
        run: npm run lint
        continue-on-error: ${{ inputs.lint-hard-fail == false }}

      - name: Capture ESLint JSON
        if: always()
        working-directory: ${{ inputs.working-directory }}
        run: npx eslint src/ --ext .js -f json -o /tmp/eslint-output.json 2>/dev/null || true
        continue-on-error: true

      # ── Unit Tests ────────────────────────────────────
      - name: Unit tests
        id: unit
        working-directory: ${{ inputs.working-directory }}
        run: ${{ inputs.test-command }}
        timeout-minutes: 5
        continue-on-error: true

      - name: Capture Jest JSON
        if: always()
        working-directory: ${{ inputs.working-directory }}
        run: npx jest --json --outputFile=/tmp/jest-output.json --passWithNoTests --forceExit 2>/dev/null || true
        timeout-minutes: 3
        continue-on-error: true

      - name: Fix coverage paths
        if: inputs.fix-coverage-paths
        run: |
          LCOV="${{ inputs.working-directory }}/coverage/lcov.info"
          if [ -f "$LCOV" ]; then
            sed -i "s|SF:src/|SF:${{ inputs.working-directory }}/src/|g" "$LCOV"
          fi

      # ── npm audit ─────────────────────────────────────
      - name: npm audit
        id: audit
        if: inputs.run-npm-audit
        working-directory: ${{ inputs.working-directory }}
        run: npm audit --audit-level=moderate --json > /tmp/audit-output.json 2>&1 || true
        continue-on-error: true

      # ── SonarCloud ────────────────────────────────────
      - name: SonarCloud Scan
        id: sonar
        uses: SonarSource/sonarcloud-github-action@v3
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── E2E Tests (Playwright) ────────────────────────
      - name: Cache Playwright browsers
        if: inputs.run-e2e && inputs.cache-playwright
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}

      - name: Install Playwright browsers
        if: inputs.run-e2e && (steps.pw-cache.outputs.cache-hit != 'true' || inputs.cache-playwright == false)
        working-directory: ${{ inputs.working-directory }}
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: inputs.run-e2e && inputs.cache-playwright && steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests
        id: e2e
        if: inputs.run-e2e
        working-directory: ${{ inputs.working-directory }}
        timeout-minutes: 5
        run: |
          GREP_ARG=""
          if [ -n "${{ inputs.e2e-grep }}" ]; then GREP_ARG="--grep ${{ inputs.e2e-grep }}"; fi
          npx playwright test --reporter=json,html $GREP_ARG
        env:
          PLAYWRIGHT_JSON_OUTPUT_FILE: test-results.json
        continue-on-error: true

      # ── Upload all results to Forseti ─────────────────
      - name: Upload results to Forseti
        if: always()
        env:
          FORSETI_URL: https://forseti.exe.pm
          PROJECT_ID: ${{ inputs.project-id }}
          CF_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          BRANCH: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          upload() {
            local type="$1" status="$2" stats="$3" summary="$4" duration="${5:-0}" phases="${6:-[]}"
            curl -sf -X POST "$FORSETI_URL/api/results/upload/$PROJECT_ID" \
              -H "Content-Type: application/json" \
              -H "CF-Access-Client-Id: $CF_ID" \
              -H "CF-Access-Client-Secret: $CF_SECRET" \
              -d "{
                \"test_type\": \"$type\",
                \"status\": \"$status\",
                \"stats\": $stats,
                \"summary\": \"$summary\",
                \"duration_ms\": $duration,
                \"source\": \"github-actions\",
                \"phases\": $phases,
                \"environment\": {\"branch\":\"$BRANCH\",\"commit\":\"$COMMIT\",\"url\":\"$RUN_URL\"}
              }" > /dev/null && echo "  ✓ $type" || echo "  ✗ $type (upload failed)"
          }

          echo "Uploading results to Forseti..."

          # Lint — parse per-file results from ESLint JSON
          LINT_PHASES='[]'
          if [ -f /tmp/eslint-output.json ]; then
            LINT_TOTAL=$(jq 'length' /tmp/eslint-output.json 2>/dev/null || echo 0)
            LINT_ERRORS=$(jq '[.[] | select(.errorCount > 0)] | length' /tmp/eslint-output.json 2>/dev/null || echo 0)
            LINT_WARNINGS=$(jq '[.[] | .warningCount] | add // 0' /tmp/eslint-output.json 2>/dev/null || echo 0)
            LINT_PASSED=$((LINT_TOTAL - LINT_ERRORS))
            LINT_PHASES=$(jq -c '[.[] | select(.messages | length > 0) | {
              name: (.filePath | split("/") | last),
              spec: .filePath,
              status: (if .errorCount > 0 then "failed" else "passed" end),
              stats: { total: (.errorCount + .warningCount), passed: 0, failed: .errorCount },
              tests: [.messages[] | "\(.ruleId // "parse-error") line \(.line) — \(if .severity == 2 then "FAILED" else "WARNING" end): \(.message)"]
            }]' /tmp/eslint-output.json 2>/dev/null || echo '[]')
            LINT_SUM="$LINT_PASSED/$LINT_TOTAL files clean, $LINT_WARNINGS warnings"
          fi
          if [ "${{ steps.lint.outcome }}" = "success" ]; then
            upload eslint passed "{\"total\":${LINT_TOTAL:-1},\"passed\":${LINT_PASSED:-1},\"failed\":0}" "${LINT_SUM:-ESLint passed}" 0 "$LINT_PHASES"
          else
            upload eslint failed "{\"total\":${LINT_TOTAL:-1},\"passed\":${LINT_PASSED:-0},\"failed\":${LINT_ERRORS:-1}}" "${LINT_SUM:-ESLint failed}" 0 "$LINT_PHASES"
          fi

          # Unit tests — parse per-suite results from Jest JSON
          JEST_PHASES='[]'
          if [ -f /tmp/jest-output.json ]; then
            JEST_TOTAL=$(jq '.numTotalTests // 0' /tmp/jest-output.json 2>/dev/null || echo 0)
            JEST_PASSED_N=$(jq '.numPassedTests // 0' /tmp/jest-output.json 2>/dev/null || echo 0)
            JEST_FAILED_N=$(jq '.numFailedTests // 0' /tmp/jest-output.json 2>/dev/null || echo 0)
            JEST_DUR=$(jq '([.testResults[]?.perfStats? | ((.end // 0) - (.start // 0))] | add // 0) | floor' /tmp/jest-output.json 2>/dev/null || echo 0)
            JEST_PHASES=$(jq -c '[.testResults[]? | {
              name: (.testFilePath | split("/") | last),
              spec: .testFilePath,
              status: (if .numFailingTests > 0 then "failed" else "passed" end),
              duration_ms: ((.perfStats.end // 0) - (.perfStats.start // 0)),
              stats: { total: (.assertionResults | length), passed: ([.assertionResults[] | select(.status == "passed")] | length), failed: ([.assertionResults[] | select(.status == "failed")] | length) },
              tests: [.assertionResults[] |
                (.ancestorTitles | join(" > ")) as $ctx |
                if .status == "failed" then
                  "\(if $ctx != "" then $ctx + " > " else "" end)\(.title) — FAILED\(if .failureMessages[0]? then ": \(.failureMessages[0] | split("\n") | first)" else "" end)"
                elif .status == "pending" then
                  "\(if $ctx != "" then $ctx + " > " else "" end)\(.title) — SKIPPED"
                else
                  "\(if $ctx != "" then $ctx + " > " else "" end)\(.title) — PASSED"
                end
              ]
            }]' /tmp/jest-output.json 2>/dev/null || echo '[]')
            JEST_SUM="$JEST_PASSED_N/$JEST_TOTAL passed"
          fi
          if [ "${{ steps.unit.outcome }}" = "success" ]; then
            upload jest-unit passed "{\"total\":${JEST_TOTAL:-1},\"passed\":${JEST_PASSED_N:-1},\"failed\":0}" "${JEST_SUM:-Unit tests passed}" "${JEST_DUR:-0}" "$JEST_PHASES"
          else
            upload jest-unit failed "{\"total\":${JEST_TOTAL:-1},\"passed\":${JEST_PASSED_N:-0},\"failed\":${JEST_FAILED_N:-1}}" "${JEST_SUM:-Unit tests failed}" "${JEST_DUR:-0}" "$JEST_PHASES"
          fi

          # npm audit — parse per-severity breakdown
          if [ "${{ inputs.run-npm-audit }}" = "true" ]; then
            AUDIT_PHASES='[]'
            VULNS=0
            if [ -f /tmp/audit-output.json ]; then
              VULNS=$(jq '[.metadata.vulnerabilities // {} | to_entries[] | .value] | add // 0' /tmp/audit-output.json 2>/dev/null || echo 0)
              AUDIT_PHASES=$(jq -c '
                (.metadata.vulnerabilities // {}) as $v |
                (.vulnerabilities // {} | to_entries | group_by(.value.severity)) as $groups |
                [if ($v | to_entries | map(.value) | add // 0) > 0 then
                  {
                    name: "Vulnerabilities",
                    status: "failed",
                    stats: { total: ($v | to_entries | map(.value) | add // 0), passed: 0, failed: ($v | to_entries | map(.value) | add // 0) },
                    tests: [.vulnerabilities // {} | to_entries[:20][] |
                      "\(.value.name) (\(.value.severity)) — FAILED: \(.value.title // "no details") via \(.value.via | if type == "array" then [.[] | if type == "string" then . else .name // "?" end] | join(", ") else "?" end)"
                    ]
                  }
                else
                  {
                    name: "Dependencies",
                    status: "passed",
                    stats: { total: 1, passed: 1, failed: 0 },
                    tests: ["All dependencies clean — PASSED"]
                  }
                end]' /tmp/audit-output.json 2>/dev/null || echo '[]')
            fi
            if [ "$VULNS" = "0" ]; then
              upload npm-audit passed '{"total":1,"passed":1,"failed":0}' "No vulnerabilities" 0 "$AUDIT_PHASES"
            else
              upload npm-audit failed "{\"total\":1,\"passed\":0,\"failed\":1}" "$VULNS vulnerabilities" 0 "$AUDIT_PHASES"
            fi
          fi

          # SonarCloud
          [ "${{ steps.sonar.outcome }}" = "success" ] \
            && upload sonarcloud passed '{"total":1,"passed":1,"failed":0}' "Quality gate passed" \
            || upload sonarcloud failed '{"total":1,"passed":0,"failed":1}' "SonarCloud failed"

          # E2E (Playwright) — use step outcome as primary signal (accounts for retries)
          if [ "${{ inputs.run-e2e }}" = "true" ]; then
            E2E_OUTCOME="${{ steps.e2e.outcome }}"
            RESULTS_FILE="${{ inputs.working-directory }}/test-results.json"
            if [ -f "$RESULTS_FILE" ]; then
              TOTAL=$(jq '((.stats.expected//0)+(.stats.unexpected//0)+(.stats.skipped//0))' "$RESULTS_FILE")
              PASSED=$(jq '.stats.expected//0' "$RESULTS_FILE")
              FAILED=$(jq '.stats.unexpected//0' "$RESULTS_FILE")
              SKIPPED=$(jq '.stats.skipped//0' "$RESULTS_FILE")
              DUR=$(jq '.stats.duration//0|floor' "$RESULTS_FILE")

              # Extract per-spec phases with individual test names and errors
              # Playwright nests: suites[] (file) → suites[] (describe) → specs[] (test)
              PHASES=$(jq -c '
                [.suites[]? | .title as $file | .file as $path |
                  # Collect all specs: direct + nested suites
                  ( (.specs // []) + [.suites[]? | .specs[]?] | flatten ) as $allSpecs |
                  {
                    name: $file,
                    spec: ($path // $file),
                    status: (if ([$allSpecs[]?.tests[]? | select(.status == "unexpected")] | length) > 0 then "failed" else "passed" end),
                    duration_ms: ([$allSpecs[]?.tests[]?.results[]?.duration // 0] | add // 0),
                    stats: {
                      total: ($allSpecs | length),
                      passed: ([$allSpecs[]? | select(all(.tests[]?; .status == "expected"))] | length),
                      failed: ([$allSpecs[]? | select(any(.tests[]?; .status == "unexpected"))] | length)
                    },
                    tests: [$allSpecs[]? |
                      (.title) as $t |
                      (if any(.tests[]?; .status == "expected") then "passed"
                       elif any(.tests[]?; .status == "skipped") then "skipped"
                       else "failed" end) as $st |
                      ([.tests[]?.results[]? | select(.error) | .error.message // empty] | first // null) as $err |
                      if $st == "failed" and $err then "\($t) — FAILED: \($err | split("\n") | first)"
                      elif $st == "failed" then "\($t) — FAILED"
                      elif $st == "skipped" then "\($t) — SKIPPED"
                      else "\($t) — PASSED" end
                    ]
                  }
                ]' "$RESULTS_FILE" 2>/dev/null || echo '[]')

              [ "$E2E_OUTCOME" = "success" ] && E2E_S=passed || E2E_S=failed
              upload playwright-e2e "$E2E_S" "{\"total\":$TOTAL,\"passed\":$PASSED,\"failed\":$FAILED,\"skipped\":$SKIPPED}" "$PASSED/$TOTAL passed" "$DUR" "$PHASES"
            else
              [ "$E2E_OUTCOME" = "success" ] \
                && upload playwright-e2e passed '{"total":1,"passed":1,"failed":0}' "E2E passed" \
                || upload playwright-e2e failed '{"total":1,"passed":0,"failed":1}' "E2E failed"
            fi
          fi

          # Summary table
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| ESLint | ${{ steps.lint.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ steps.unit.outcome }} |" >> $GITHUB_STEP_SUMMARY
          [ "${{ inputs.run-npm-audit }}" = "true" ] && echo "| npm audit | ${{ steps.audit.outcome }} |" >> $GITHUB_STEP_SUMMARY || true
          echo "| SonarCloud | ${{ steps.sonar.outcome }} |" >> $GITHUB_STEP_SUMMARY
          [ "${{ inputs.run-e2e }}" = "true" ] && echo "| E2E Tests | ${{ steps.e2e.outcome }} |" >> $GITHUB_STEP_SUMMARY || true

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: inputs.run-e2e && failure()
        with:
          name: playwright-report
          path: ${{ inputs.working-directory }}/playwright-report/
          retention-days: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # Docker Build & Push
  # ═══════════════════════════════════════════════════════════════════════════
  docker:
    name: Build & Push Docker
    needs: test
    if: inputs.build-docker && github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_TIMESTAMP=${{ github.event.head_commit.timestamp }}
