name: Prune Docker Images

on:
  schedule:
    - cron: '0 3 * * 0'  # Every Sunday at 03:00 UTC
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Dry run (log only, no deletions)'
        type: boolean
        default: true
      keep-versions:
        description: 'Number of tagged versions to keep per package (besides latest)'
        type: number
        default: 5

jobs:
  prune:
    name: Prune Package - ${{ matrix.package }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package:
          - kanban
          - mimir
          - calify
          - chiefofstaff
          - grablist
          - forseti
          - wodforge
          - nighttales
          - nytsyn
          - stuffbase
          - schmidt-larsen
          - sorring3d
          - sorring-udlejning
          - eir
          - yggdrasil

    steps:
      - name: Delete old versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.package }}
          package-type: container
          min-versions-to-keep: ${{ github.event.inputs.keep-versions || 6 }}
          delete-only-untagged-versions: false
          token: ${{ secrets.GITHUB_TOKEN }}
